<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>toc-track · 10 种呈现手段</title>
<style>
  /* ---- Kimi Web design tokens (light), mirrored from src/style.css ---- */
  :root {
    --bg: #ffffff;
    --surface: #fafbfc;
    --surface-raised: #ffffff;
    --surface-sunken: #f3f5f8;
    --canvas: #f4f6fa;
    --text: rgba(0, 0, 0, 0.9);
    --text-muted: #6b7280;
    --text-faint: #9aa3af;
    --line: #e7eaee;
    --line-strong: #d4d9e0;
    --accent: #1783ff;
    --accent-hover: #0f6fe0;
    --accent-soft: #e8f3ff;
    --accent-bd: #cfe6ff;
    --ok: #0e7a38;
    --r-xs: 4px; --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-full: 999px;
    --sh-sm: 0 1px 2px rgba(16, 24, 40, 0.05), 0 1px 3px rgba(16, 24, 40, 0.06);
    --sh-md: 0 4px 12px rgba(16, 24, 40, 0.07), 0 2px 4px rgba(16, 24, 40, 0.05);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--canvas);
    color: var(--text);
    font-family: var(--font-ui);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 44px 28px 88px; }

  /* ---- page header ---- */
  header.page { margin-bottom: 30px; }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 { font-size: 26px; font-weight: 600; margin: 0 0 10px; letter-spacing: -0.02em; }
  .lede { font-size: 14px; line-height: 1.6; color: var(--text-muted); max-width: 760px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px;
    margin-top: 18px; font-size: 12px; color: var(--text-muted);
  }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
  .lg-user { background: var(--accent); }
  .lg-ai { background: var(--surface-sunken); box-shadow: inset 0 0 0 1px var(--line-strong); }
  .lg-compact { background: transparent; box-shadow: inset 0 0 0 1px var(--text-faint); border-radius: 999px; }
  .lg-vp { background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent-bd); }

  /* ---- grid + card ---- */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .expl {
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    box-shadow: var(--sh-sm);
    overflow: hidden;
  }
  .expl-head { padding: 15px 18px 13px; border-bottom: 1px solid var(--line); }
  .expl-title { display: flex; align-items: center; gap: 10px; }
  .expl-num {
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    color: var(--accent); background: var(--accent-soft);
    border-radius: var(--r-sm); padding: 2px 7px;
  }
  .expl-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .expl-why { font-size: 13px; line-height: 1.5; color: var(--text-muted); margin-top: 7px; }
  .expl-body {
    padding: 20px;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(23, 131, 255, 0.04), transparent 60%),
      var(--surface);
    min-height: 360px;
  }

  /* ---- the mock chat pane (shared context) ---- */
  .pane {
    position: relative;
    width: 312px; height: 330px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--sh-sm);
    overflow: hidden;
  }
  .chat-col { position: absolute; inset: 0 58px 0 0; padding: 16px 14px; overflow: hidden; }
  .bub { max-width: 86%; margin-bottom: 12px; border-radius: var(--r-lg); font-size: 12px; line-height: 1.45; }
  .bub .ln2 { height: 7px; border-radius: 4px; background: var(--line); margin-top: 6px; }
  .bub.u {
    margin-left: auto; padding: 8px 11px;
    background: var(--accent-soft); color: var(--accent-hover);
    border: 1px solid var(--accent-bd);
  }
  .bub.a { padding: 2px 0; }
  .bub.a .ln2 { background: var(--line); }
  .bub.a .ln2.s { width: 62%; }
  .bub.a .ln2.m { width: 86%; }
  .bub.a .ln2.l { width: 96%; }
  .bub.hot { outline: 2px solid var(--accent-bd); outline-offset: 2px; }
  .toc-host { position: absolute; top: 14px; bottom: 14px; right: 11px; width: 44px; }

  /* ================================================================
     Shared track primitives
     ================================================================ */
  .track { position: relative; width: 100%; height: 100%; }
  .track .it { cursor: pointer; }
  .track .it { transition: filter 0.15s var(--ease), transform 0.15s var(--ease), opacity 0.15s var(--ease); }

  /* tooltip (shared, CSS-only) */
  .tip {
    position: absolute; right: calc(100% + 9px);
    max-width: 188px; padding: 6px 9px;
    background: var(--surface-raised); color: var(--text);
    border: 1px solid var(--line); border-radius: var(--r-md);
    box-shadow: var(--sh-md); font-size: 11px; line-height: 1.4;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0; pointer-events: none; transform: translateX(4px);
    transition: opacity 0.12s var(--ease), transform 0.12s var(--ease);
    z-index: 20;
  }
  .it:hover .tip, .row:hover .tip, .chip:hover .tip, .num:hover .tip { opacity: 1; transform: translateX(0); }

  /* ================================================================
     01 · Proportional bars (refined minimap)
     ================================================================ */
  .bars .it {
    position: absolute; left: 50%; width: 17px; transform: translateX(-50%);
    border-radius: var(--r-sm);
  }
  .bars .it.user { background: var(--accent); }
  .bars .it.assistant { background: var(--surface-sunken); box-shadow: inset 0 0 0 1px var(--line-strong); }
  .bars .it.compaction { width: 22px; background: transparent; box-shadow: inset 0 0 0 1px var(--text-faint); border-radius: var(--r-full); }
  .bars .it.active { box-shadow: 0 0 0 2px var(--accent-bd); }
  .bars .it.active::after {
    content: ""; position: absolute; inset: -3px; border: 2px solid var(--accent);
    border-radius: var(--r-md); opacity: 0.4;
  }
  .bars .it:hover { filter: brightness(0.97); transform: translateX(-50%) scale(1.07); }
  .bars .vp {
    position: absolute; left: 4px; right: 4px;
    background: var(--accent-soft); border: 1.5px solid var(--accent-bd);
    border-radius: var(--r-sm); pointer-events: none;
  }

  /* ================================================================
     02 · Timeline spine
     ================================================================ */
  .spine .line {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
    transform: translateX(-50%); background: var(--line-strong); border-radius: 2px;
  }
  .spine .vp {
    position: absolute; left: 50%; width: 4px; transform: translateX(-50%);
    background: var(--accent); border-radius: 3px; opacity: 0.5;
  }
  .spine .vp::before, .spine .vp::after {
    content: ""; position: absolute; left: -7px; width: 18px; height: 2px;
    background: var(--accent); border-radius: 2px;
  }
  .spine .vp::before { top: 0; } .spine .vp::after { bottom: 0; }
  .spine .node {
    position: absolute; left: 50%; transform: translate(-50%, -50%);
    border-radius: var(--r-full); background: var(--bg);
  }
  .spine .node.user { background: var(--accent); }
  .spine .node.assistant { background: var(--bg); border: 2px solid var(--line-strong); }
  .spine .node.compaction { width: 14px; height: 3px; border-radius: 2px; background: var(--text-faint); }
  .spine .node.s { width: 9px; height: 9px; }
  .spine .node.m { width: 12px; height: 12px; }
  .spine .node.l { width: 15px; height: 15px; }
  .spine .node.active { box-shadow: 0 0 0 5px var(--accent-soft); }
  .spine .node.active.user { box-shadow: 0 0 0 5px var(--accent-soft), 0 0 0 7px var(--accent-bd); }
  .spine .node:hover { transform: translate(-50%, -50%) scale(1.2); }

  /* ================================================================
     03 · Equal dot strip
     ================================================================ */
  .dots .it {
    position: absolute; left: 50%; width: 9px; height: 9px;
    transform: translate(-50%, -50%); border-radius: var(--r-full);
  }
  .dots .it.user { background: var(--accent); }
  .dots .it.assistant { background: var(--line-strong); }
  .dots .it.compaction { width: 9px; height: 2px; border-radius: 2px; background: var(--text-faint); }
  .dots .it.active { box-shadow: 0 0 0 4px var(--accent-soft); background: var(--accent); }
  .dots .it:hover { transform: translate(-50%, -50%) scale(1.35); }
  .dots .vprange {
    position: absolute; left: 50%; width: 21px; transform: translateX(-50%);
    background: var(--accent-soft); border-radius: var(--r-full); opacity: 0.7;
  }

  /* ================================================================
     04 · Numbered rail
     ================================================================ */
  .rail .vprange {
    position: absolute; left: 2px; right: 2px;
    background: var(--accent-soft); border-radius: var(--r-sm);
  }
  .num {
    position: absolute; left: 50%; transform: translate(-50%, -50%);
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    color: var(--text-faint); cursor: pointer;
    width: 22px; height: 16px; display: flex; align-items: center; justify-content: center;
    border-radius: var(--r-sm);
  }
  .num.user { color: var(--accent); }
  .num.compaction { color: var(--text-faint); }
  .num.active { color: var(--accent); background: var(--accent-soft); }
  .num:hover { background: var(--surface-sunken); color: var(--text); }

  /* ================================================================
     05 · Thread tree
     ================================================================ */
  .tree { display: flex; flex-direction: column; }
  .tree .row {
    position: relative; display: flex; align-items: center; gap: 5px;
    height: 20px; padding: 0 4px; border-radius: var(--r-sm); cursor: pointer;
  }
  .tree .row.ai { padding-left: 13px; }
  .tree .row.ai::before {
    content: ""; position: absolute; left: 5px; top: -3px; bottom: 50%;
    width: 5px; border-left: 1.5px solid var(--line-strong); border-bottom: 1.5px solid var(--line-strong);
    border-radius: 0 0 0 4px;
  }
  .tree .rd { width: 6px; height: 6px; border-radius: var(--r-full); flex: none; }
  .tree .row.user .rd { background: var(--accent); }
  .tree .row.ai .rd { background: var(--line-strong); }
  .tree .row.compaction .rd { width: 8px; height: 2px; border-radius: 2px; background: var(--text-faint); }
  .tree .rt { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree .row.active { background: var(--accent-soft); }
  .tree .row.active .rt { color: var(--accent-hover); font-weight: 600; }
  .tree .row:hover { background: var(--surface-sunken); }
  .tree .vprange { position: absolute; left: 0; width: 2.5px; background: var(--accent); border-radius: 2px; }

  /* ================================================================
     06 · Density heatmap
     ================================================================ */
  .heat { display: flex; flex-direction: column; }
  .heat .it { width: 100%; border-radius: 2px; }
  .heat .it.user { background: var(--accent); opacity: 0.85; }
  .heat .it.assistant { background: var(--surface-sunken); box-shadow: inset 0 0 0 1px var(--line); }
  .heat .it.compaction { background: var(--text-faint); opacity: 0.5; }
  .heat .it.active { box-shadow: inset 3px 0 0 var(--accent); opacity: 1; }
  .heat .it:hover { filter: brightness(0.96); }
  .heat .vp {
    position: absolute; left: -2px; right: -2px;
    border: 1.5px solid var(--accent); border-radius: var(--r-sm);
    background: rgba(232, 243, 255, 0.35); pointer-events: none;
  }

  /* ================================================================
     07 · Chapter scrollbar
     ================================================================ */
  .scroll { border-radius: var(--r-full); overflow: hidden; box-shadow: inset 0 0 0 1px var(--line); }
  .scroll .seg { width: 100%; }
  .scroll .seg.user { background: var(--accent-soft); }
  .scroll .seg.assistant { background: var(--surface); }
  .scroll .seg.compaction { background: var(--line); }
  .scroll .seg.active { background: var(--accent-bd); }
  .scroll .thumb {
    position: absolute; left: 3px; right: 3px;
    background: var(--accent); border-radius: var(--r-full);
    box-shadow: var(--sh-sm); pointer-events: none;
  }
  .scroll .tk {
    position: absolute; left: 0; right: 0; height: 1px; background: rgba(255, 255, 255, 0.7);
  }

  /* ================================================================
     08 · Chips with snippets
     ================================================================ */
  .chips { display: flex; flex-direction: column; gap: 3px; }
  .chip {
    display: flex; align-items: center; gap: 5px;
    padding: 3px 6px; border-radius: var(--r-sm); cursor: pointer;
    border: 1px solid transparent;
  }
  .chip .rd { width: 6px; height: 6px; border-radius: var(--r-full); flex: none; }
  .chip.user .rd { background: var(--accent); }
  .chip.assistant .rd { background: var(--line-strong); }
  .chip.compaction .rd { width: 8px; height: 2px; border-radius: 2px; background: var(--text-faint); }
  .chip .ct { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip.active { background: var(--accent-soft); border-color: var(--accent-bd); }
  .chip.active .ct { color: var(--accent-hover); font-weight: 600; }
  .chip:hover { background: var(--surface-sunken); }

  /* ================================================================
     09 · Waveform
     ================================================================ */
  .wave .axis {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 1.5px;
    transform: translateX(-50%); background: var(--line);
  }
  .wave .bar {
    position: absolute; top: 0; height: 2.5px; border-radius: 2px;
    transform: translateY(-50%);
  }
  .wave .bar.user { left: 50%; background: var(--accent); }
  .wave .bar.assistant { right: 50%; background: var(--line-strong); }
  .wave .bar.compaction { left: 50%; right: 50%; width: 10px; transform: translate(-50%, -50%); background: var(--text-faint); }
  .wave .vp { position: absolute; left: 2px; right: 2px; background: var(--accent-soft); border-radius: var(--r-sm); opacity: 0.6; }
  .wave .bar.active { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

  /* ================================================================
     10 · Document thumbnail
     ================================================================ */
  .thumb { padding: 4px 3px; }
  .thumb .tk { display: flex; flex-direction: column; gap: 2px; }
  .thumb .tk.user { align-items: flex-end; }
  .thumb .tk .g { height: 3px; border-radius: 2px; background: var(--line); }
  .thumb .tk.user .g { background: var(--accent-bd); width: 70%; }
  .thumb .tk.compaction { align-items: center; }
  .thumb .tk.compaction .g { background: var(--text-faint); width: 40%; height: 2px; }
  .thumb .tk.active .g { background: var(--accent); }
  .thumb .vp {
    position: absolute; left: 1px; right: 1px;
    border: 1.5px solid var(--accent); border-radius: var(--r-xs);
    background: rgba(232, 243, 255, 0.3); pointer-events: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <div class="eyebrow">ConversationToc · toc-track</div>
    <h1>toc-track 的 10 种呈现手段</h1>
    <p class="lede">
      toc-track 是会话右侧的「导航 minimap」——把每条 turn 按比例映射成轨道上的一个标记，
      并叠加当前视口位置。下面用同一份 14 条 turn 的样本数据（用户 / 助手 / 压缩、长短不一，视口覆盖中段、第 6 条为当前）
      展示 10 种视觉方向，均套用 Kimi Web 的设计 token。悬停任意标记可看标题。
    </p>
    <div class="legend">
      <span><i class="lg-user"></i>用户 turn</span>
      <span><i class="lg-ai"></i>助手 turn</span>
      <span><i class="lg-compact"></i>压缩分隔</span>
      <span><i class="lg-vp"></i>当前视口</span>
    </div>
  </header>

  <div class="grid" id="grid"></div>
</div>

<script>
  /* ---- shared sample dataset (14 turns) ---- */
  const turns = [
    { role: 'user',      w: 18, title: '帮我看下这个 repo 的结构' },
    { role: 'assistant', w: 64, title: '我先扫一下根目录和 package.json，理清 workspace 划分' },
    { role: 'user',      w: 16, title: '重点看 auth 模块' },
    { role: 'assistant', w: 40, title: 'auth 在 packages/oauth，核心是 OAuthProvider' },
    { role: 'compaction',w: 8,  title: 'Context compacted · 12k → 4k tokens' },
    { role: 'assistant', w: 56, title: '继续看 refresh token 的流转，发现没有轮换' },
    { role: 'user',      w: 24, title: '这里有个 bug 修一下' },
    { role: 'assistant', w: 28, title: '好，refresh token 没加 rotation' },
    { role: 'user',      w: 16, title: '加单测' },
    { role: 'assistant', w: 60, title: '补了 3 个 case：refresh / revoke / 过期' },
    { role: 'user',      w: 22, title: '跑一下看看' },
    { role: 'assistant', w: 36, title: '全部通过 ✅' },
    { role: 'user',      w: 18, title: '提交吧' },
    { role: 'assistant', w: 52, title: '已 push，PR #482' },
  ];
  const sum = turns.reduce((a, t) => a + t.w, 0);
  let acc = 0;
  turns.forEach((t, i) => { t.i = i; t.no = i + 1; t.top = acc / sum * 100; t.h = t.w / sum * 100; acc += t.w; });
  const ACTIVE = 5;                       // the long assistant turn
  const VP = { top: 30.1, height: 25.3 }; // viewport covers turns 5–8
  const N = turns.length;

  const esc = (s) => s.replace(/"/g, '&quot;');
  const cls = (t) => `${t.role}${t.i === ACTIVE ? ' active' : ''}`;
  const tip = (t) => `<span class="tip">${esc(t.title)}</span>`;
  const eqTop = (i) => (i + 0.5) / N * 100; // equal-spacing vertical position (%)

  /* ---- chat context (static, same for all) ---- */
  function chatCol() {
    return `
      <div class="chat-col">
        <div class="bub a"><div class="ln2 l"></div><div class="ln2 m"></div></div>
        <div class="bub u">这里有个 bug 修一下</div>
        <div class="bub a hot"><div class="ln2 l"></div><div class="ln2 s"></div><div class="ln2 m"></div></div>
        <div class="bub u">加单测</div>
        <div class="bub a"><div class="ln2 m"></div><div class="ln2 l"></div></div>
      </div>`;
  }

  /* ============================================================
     variant renderers — each returns the inner HTML of .toc-host
     ============================================================ */

  // 01 · proportional bars
  function vBars() {
    let h = `<div class="track bars">`;
    turns.forEach(t => { h += `<i class="it ${cls(t)}" style="top:${t.top}%;height:${t.h}%">${tip(t)}</i>`; });
    h += `<i class="vp" style="top:${VP.top}%;height:${VP.height}%"></i></div>`;
    return h;
  }

  // 02 · timeline spine
  function vSpine() {
    const sz = (w) => w >= 48 ? 'l' : w >= 24 ? 'm' : 's';
    let h = `<div class="track spine"><i class="line"></i>`;
    h += `<i class="vp" style="top:${VP.top}%;height:${VP.height}%"></i>`;
    turns.forEach(t => {
      const c = t.role === 'compaction' ? 'compaction' : `${t.role} ${sz(t.w)}`;
      h += `<i class="node it ${c} ${t.i === ACTIVE ? 'active' : ''}" style="top:${t.top + t.h / 2}%">${tip(t)}</i>`;
    });
    return h + `</div>`;
  }

  // 03 · equal dot strip
  function vDots() {
    let h = `<div class="track dots">`;
    h += `<i class="vprange" style="top:${VP.top}%;height:${VP.height}%"></i>`;
    turns.forEach(t => { h += `<i class="it ${cls(t)}" style="top:${eqTop(t.i)}%">${tip(t)}</i>`; });
    return h + `</div>`;
  }

  // 04 · numbered rail
  function vRail() {
    let h = `<div class="track rail">`;
    h += `<i class="vprange" style="top:${VP.top}%;height:${VP.height}%"></i>`;
    turns.forEach(t => {
      const label = t.role === 'compaction' ? '·' : t.no;
      h += `<i class="num ${cls(t)}" style="top:${eqTop(t.i)}%">${label}${tip(t)}</i>`;
    });
    return h + `</div>`;
  }

  // 05 · thread tree
  function vTree() {
    let h = `<div class="track tree">`;
    h += `<i class="vprange" style="top:${VP.top}%;height:${VP.height}%"></i>`;
    turns.forEach(t => {
      const kind = t.role === 'user' ? 'user' : t.role === 'compaction' ? 'compaction' : 'ai';
      h += `<div class="row ${kind} ${t.i === ACTIVE ? 'active' : ''}"><i class="rd"></i><span class="rt">${esc(t.title)}</span>${tip(t)}</div>`;
    });
    return h + `</div>`;
  }

  // 06 · density heatmap
  function vHeat() {
    let h = `<div class="track heat">`;
    turns.forEach(t => { h += `<i class="it ${cls(t)}" style="height:${t.h}%">${tip(t)}</i>`; });
    h += `<i class="vp" style="top:${VP.top}%;height:${VP.height}%"></i></div>`;
    return h;
  }

  // 07 · chapter scrollbar
  function vScroll() {
    let h = `<div class="track scroll">`;
    turns.forEach(t => {
      h += `<i class="seg ${t.role} ${t.i === ACTIVE ? 'active' : ''}" style="height:${t.h}%"></i>`;
      h += `<i class="tk" style="top:${t.top + t.h}%"></i>`;
    });
    h += `<i class="thumb" style="top:${VP.top}%;height:${VP.height}%"></i></div>`;
    return h;
  }

  // 08 · chips with snippets
  function vChips() {
    let h = `<div class="track chips">`;
    turns.forEach(t => {
      h += `<div class="chip ${cls(t)}"><i class="rd"></i><span class="ct">${esc(t.title)}</span>${tip(t)}</div>`;
    });
    return h + `</div>`;
  }

  // 09 · waveform
  function vWave() {
    let h = `<div class="track wave"><i class="axis"></i>`;
    h += `<i class="vp" style="top:${VP.top}%;height:${VP.height}%"></i>`;
    turns.forEach(t => {
      const len = 8 + (t.w / 64) * 15; // px amplitude
      const style = t.role === 'compaction'
        ? `top:${t.top + t.h / 2}%`
        : `top:${t.top + t.h / 2}%;width:${len}px`;
      h += `<i class="bar it ${cls(t)}" style="${style}">${tip(t)}</i>`;
    });
    return h + `</div>`;
  }

  // 10 · document thumbnail
  function vThumb() {
    let h = `<div class="track thumb">`;
    turns.forEach(t => {
      const lines = Math.max(1, Math.round(t.w / 12));
      let g = '';
      for (let i = 0; i < lines; i++) g += `<i class="g" style="width:${50 + ((i * 17) % 45)}%"></i>`;
      h += `<div class="tk ${cls(t)}" style="height:${t.h}%">${g}</div>`;
    });
    h += `<i class="vp" style="top:${VP.top}%;height:${VP.height}%"></i></div>`;
    return h;
  }

  /* ============================================================
     card manifest
     ============================================================ */
  const cards = [
    { name: 'Proportional bars', why: '当前方案的精修版。每段高度 ∝ turn 长度，角色配色，视口是带描边的半透明窗。密度高、一眼看长短。',
      render: vBars },
    { name: 'Timeline spine', why: '一条中轴 + 节点，节点大小表长度、左右/填充表角色。视口是轴上的高亮段加两端刻度，像 GitHub timeline。',
      render: vSpine },
    { name: 'Equal dot strip', why: '全部等距等大的小点，只看「有几条 / 现在在哪」。最省空间、最克制，适合不需要体现长短时。',
      render: vDots },
    { name: 'Numbered rail', why: '等距的序号 #1…#14（mono）。给出明确的次序感，点击序号跳转；视口内序号加浅底。',
      render: vRail },
    { name: 'Thread tree', why: '用户 turn 顶格、助手 turn 缩进并带 └ 连接线，像文件树 / 评论串。强调「谁回复谁」的对话结构。',
      render: vTree },
    { name: 'Density heatmap', why: '满宽堆叠、高度 ∝ 长度、无间隙，读作一段连续的「沉积」。抽象，但能直观看到长 turn 扎堆在哪。',
      render: vHeat },
    { name: 'Chapter scrollbar', why: 'toc 就是滚动条本体：轨道按比例切成角色着色的章节，滑块即视口。最符合既有操作直觉。',
      render: vScroll },
    { name: 'Chips with snippets', why: '每段一个小胶囊：角色点 + 截断标题。最可读、信息最多，但占宽度，密度低。',
      render: vChips },
    { name: 'Waveform', why: '像音频波形：中轴两侧按角色伸展、振幅 ∝ 长度。视觉独特，把对话读成一条「信号」。',
      render: vWave },
    { name: 'Document thumbnail', why: '整段对话的缩略预览：蓝块=用户气泡、灰线=助手文字，视口是一枚清晰的框。最「minimap」。',
      render: vThumb },
  ];

  const grid = document.getElementById('grid');
  cards.forEach((c, i) => {
    const el = document.createElement('article');
    el.className = 'expl';
    el.innerHTML = `
      <div class="expl-head">
        <div class="expl-title">
          <span class="expl-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="expl-name">${c.name}</span>
        </div>
        <div class="expl-why">${c.why}</div>
      </div>
      <div class="expl-body">
        <div class="pane">
          ${chatCol()}
          <div class="toc-host">${c.render()}</div>
        </div>
      </div>`;
    grid.appendChild(el);
  });
</script>
</body>
</html>
